name: CI

on:
  push:
  pull_request:
    branches: [master]

jobs:
  # ── Whitebox: Jest unit + integration tests (DB fully mocked) ──
  whitebox:
    name: Whitebox Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci --prefer-offline=false
        working-directory: server

      - name: Run Jest tests
        run: npm test
        working-directory: server
        env:
          JWT_SECRET: ci-test-secret
          NODE_ENV: test

  # ── Blackbox: Playwright E2E tests (server started, no DB needed) ──
  blackbox:
    name: Blackbox Tests (Playwright)
    runs-on: ubuntu-latest
    needs: whitebox

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start server in background
        run: node src/app.js &
        working-directory: server
        env:
          PORT: 3000
          JWT_SECRET: ci-test-secret
          NODE_ENV: test
          # DATABASE_URL intentionally omitted — server runs without DB

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000/health --timeout 15000

      - name: Run Playwright login tests
        run: npx playwright test tests/e2e/login.spec.js
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
